[tools.exec.sandbox.resource_limits]

[tools.policy]
allow = []
deny = ["mcp__*__readAttachment"]

[tools.web.search]
enabled = true
provider = "brave"
max_results = 5
timeout_seconds = 30
cache_ttl_minutes = 15
duckduckgo_fallback = false

[tools.web.search.perplexity]

[tools.web.fetch]
enabled = true
max_chars = 50000
timeout_seconds = 30
cache_ttl_minutes = 15
max_redirects = 3
readability = true
ssrf_allowlist = []

[tools.maps]
provider = "google_maps"

[tools.browser]
enabled = true
headless = true
viewport_width = 2560
viewport_height = 1440
device_scale_factor = 2.0
max_instances = 0
memory_limit_percent = 90
idle_timeout_secs = 300
navigation_timeout_ms = 30000
chrome_args = []
sandbox_image = "browserless/chrome"
allowed_domains = []
low_memory_threshold_mb = 2048
persist_profile = true

[skills]
enabled = false
search_paths = []
auto_load = []

[mcp.servers]

[channels.telegram]

[tls]
enabled = true
auto_generate = true

[auth]
disabled = false

[metrics]
enabled = true
prometheus_endpoint = true
history_points = 360

[metrics.labels]

[user]
name = "Serhii"
timezone = "Asia/Tbilisi"

[memory]
disable_rag = false
llm_reranking = false
session_export = false

[memory.qmd.collections]

[tailscale]
mode = "off"
reset_on_exit = true

[failover]
enabled = true
fallback_models = []

[heartbeat]
enabled = true
every = "30m"
ack_max_chars = 300
sandbox_enabled = true

[heartbeat.active_hours]
start = "08:00"
end = "24:00"
timezone = "local"

[voice.tts]
enabled = false
provider = "elevenlabs"
providers = []

[voice.tts.elevenlabs]

[voice.tts.openai]

[voice.tts.google]

[voice.tts.piper]

[voice.tts.coqui]
endpoint = "http://localhost:5002"

[voice.stt]
enabled = true
provider = "whisper"
providers = []

[voice.stt.whisper]

[voice.stt.groq]

[voice.stt.deepgram]
smart_format = false

[voice.stt.google]

[voice.stt.mistral]

[voice.stt.elevenlabs]

[voice.stt.voxtral_local]
endpoint = "http://localhost:8000"

[voice.stt.whisper_cli]

[voice.stt.sherpa_onnx]

[cron]
rate_limit_max = 10
rate_limit_window_secs = 60

