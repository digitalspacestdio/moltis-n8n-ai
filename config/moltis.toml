# Moltis config for moltis-n8n stack
# Routes OpenAI-compatible traffic through LiteLLM.

[server]
bind = "0.0.0.0"
port = 13131
http_request_logs = false
ws_request_logs = false
log_buffer_size = 1000

[identity]
name = "Moltis"
emoji = "🦊"

[providers]
offered = ["openai"]

[providers.openai]
enabled = true
models = ["gpt-4o"]
base_url = "http://litellm/llm"

[chat]
priority_models = ["gpt-4o"]
message_queue_mode = "followup"

[tools]
agent_timeout_secs = 600
agent_max_iterations = 25
max_tool_result_bytes = 50000

[tools.exec]
default_timeout_secs = 30
max_output_bytes = 204800
approval_mode = "on-miss"
security_level = "allowlist"
allowlist = []

[tools.exec.sandbox]
mode = "all"
scope = "session"
workspace_mount = "ro"
no_network = true
backend = "auto"
packages = [
    "curl",
    "wget",
    "ca-certificates",
    "dnsutils",
    "netcat-openbsd",
    "openssh-client",
    "iproute2",
    "net-tools",
    "python3",
    "python3-dev",
    "python3-pip",
    "python3-venv",
    "python-is-python3",
    "nodejs",
    "npm",
    "ruby",
    "ruby-dev",
    "build-essential",
    "clang",
    "libclang-dev",
    "llvm-dev",
    "pkg-config",
    "libssl-dev",
    "libsqlite3-dev",
    "libyaml-dev",
    "liblzma-dev",
    "autoconf",
    "automake",
    "libtool",
    "bison",
    "flex",
    "dpkg-dev",
    "fakeroot",
    "zip",
    "unzip",
    "bzip2",
    "xz-utils",
    "p7zip-full",
    "tar",
    "zstd",
    "lz4",
    "pigz",
    "git",
    "gnupg2",
    "jq",
    "rsync",
    "file",
    "tree",
    "sqlite3",
    "sudo",
    "locales",
    "tzdata",
